<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Laravel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #splash { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 24px; }
        .logo { font-size: 32px; font-weight: 700; color: #dc2626; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .logo-icon { width: 64px; height: 64px; background: rgba(220,38,38,0.15); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .spinner { width: 32px; height: 32px; border: 3px solid #1f1f1f; border-top-color: #dc2626; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .status { font-size: 14px; color: #666; }
        #app { display: none; flex: 1; width: 100%; border: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="splash">
        <div class="logo">
            <img src="/logo_nb.png" alt="Laravel" height="60">
            Laravel
        </div>
        <div class="spinner"></div>
        <div class="status" id="status">Loading...</div>
    </div>
    <iframe id="app"></iframe>
    <script type="module" src="./nativeblade.js"></script>
</body>
</html>
